server:
  port: 8080

spring:
  application:
    name: dear-floral-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/d2}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${APP_JWT_SECRET:please-change-this-secret-before-production}
    access-token-ttl-minutes: ${APP_JWT_ACCESS_TOKEN_TTL_MINUTES:120}
    issuer: ${APP_JWT_ISSUER:dear-floral}
  file-storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from-name: ${APP_MAIL_FROM_NAME:Dear Floral}
    frontend-order-url: ${APP_FRONTEND_ORDER_URL:http://localhost:5173/account/orders}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
