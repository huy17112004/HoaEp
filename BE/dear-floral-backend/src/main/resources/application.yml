server:
  port: 8080

spring:
  application:
    name: dear-floral-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/dear_floral}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${APP_JWT_SECRET:please-change-this-secret-before-production}
    access-token-ttl-minutes: ${APP_JWT_ACCESS_TOKEN_TTL_MINUTES:120}
    issuer: ${APP_JWT_ISSUER:dear-floral}
  file-storage:
    upload-dir: ${APP_UPLOAD_DIR:uploads}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
